_schema-version: 3.3.0
ID: Products
description: A simple CAP project.
version: 1.0.0
modules:
# ------------------- CAP Service -------------------
- name: Products-srv
# ------------------- CAP Service -------------------
  type: nodejs
  path: gen/srv
  requires:
  - name: Products-auth
  - name: Products-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
  build-parameters:
    builder: npm
 
  # ------------------- Application Content Deployer -------------------    
- name: Products-app-deployer
  # ------------------- Application Content Deployer -------------------
  type: com.sap.application.content
  path: .
  requires:
  - name: Products-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - productui.zip
      name: productui
      target-path: resources/
    ignore:
        - node_modules/  
# ------------------- HTML5 Modules -------------------      
- name: productui
# ------------------- HTML5 Modules -------------------  
  type: html5
  path: app/product_ui
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    - npm ci
    - npm run build
    supported-platforms: []
# ------------------- Approuter -------------------
- name: Products-approuter
  type: approuter.nodejs
  path: approuter
  parameters:
    disk-quota: 256M
    memory: 256M
    keep-existing-routes: true
    routes:
      - route: ${default-uri}
  requires:
    - name: srv-api
      group: destinations
      properties:
        name: srv-api
        url: ~{srv-url}
        forwardAuthToken: true
    - name: Products-auth
    - name: Products-destination
  provides:
    - name: app-api
      properties:
        app-protocol: ${protocol}
        app-uri: ${default-uri}
resources:
- name: Products-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: Products-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: Products-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  # ------------------- HTML5 Repo -------------------    
- name: Products-repo-host
  # ------------------- HTML5 Repo -------------------
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: Products-html5-service
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
